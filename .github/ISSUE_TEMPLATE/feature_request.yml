name: Feature request
description: Propose an improvement to the app or contributor workflow.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What user or maintainer problem are you trying to solve?
      placeholder: It is hard to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you want to see.
      placeholder: We should add ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any alternatives or tradeoffs you have considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, references, screenshots, or examples are welcome.
